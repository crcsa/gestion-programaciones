name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Run unit tests
        run: pnpm test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: test
    if: ${{ vars.E2E_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm test:e2e
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_BANCO_SANGRE_EMAIL: ${{ secrets.E2E_BANCO_SANGRE_EMAIL }}
          E2E_BANCO_SANGRE_PASSWORD: ${{ secrets.E2E_BANCO_SANGRE_PASSWORD }}
          E2E_COMERCIAL_EMAIL: ${{ secrets.E2E_COMERCIAL_EMAIL }}
          E2E_COMERCIAL_PASSWORD: ${{ secrets.E2E_COMERCIAL_PASSWORD }}
          E2E_OPERATIVO_EMAIL: ${{ secrets.E2E_OPERATIVO_EMAIL }}
          E2E_OPERATIVO_PASSWORD: ${{ secrets.E2E_OPERATIVO_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
